<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" rx="0" fill="#0a0a0f"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow behind icon -->
  <circle cx="390" cy="315" r="120" fill="#14b8a6" opacity="0.08"/>
  <circle cx="390" cy="315" r="80" fill="#14b8a6" opacity="0.05"/>
  <!-- Icon container -->
  <rect x="330" y="255" width="120" height="120" rx="28" fill="url(#bg)"/>
  <!-- Lightning bolt -->
  <path d="M399 275l-25 43h16l-5.5 29 25-43h-16l5.5-29z" fill="url(#bolt)" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Text: My Offer Agent -->
  <text x="490" y="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#f5f5f5" letter-spacing="-1">
    My Offer
  </text>
  <text x="490" y="360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#14b8a6" letter-spacing="-1">
    Agent
  </text>
  <!-- Tagline -->
  <text x="490" y="400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#a1a1aa" letter-spacing="0.5">
    AI-Powered Career Assistant
  </text>
</svg>
