#:schema node_modules/wrangler/config-schema.json

name = "myofferagent"
main = ".open-next/worker.js"
compatibility_date = "2026-03-11"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── Workers Logs ──
# route.ts는 운영 신호를 console.warn/log로 남깁니다 (웹 검색 회로 차단기 발화,
# report_jobs/report_match 누락, 날조 수치 되돌림, 레이트리미터 폴백 강등).
# 이 플래그가 없으면 프로덕션에서 그 신호가 전부 버려집니다.
# 로그 위생은 코드에서 보장합니다 — 이력서 내용은 로그에 싣지 않습니다.
[observability]
enabled = true

# Environment variables — set secrets via `npx wrangler secret put OPENAI_API_KEY`
#
# Optional model overrides (see src/lib/agents/model-config.ts):
#   npx wrangler secret put OPENAI_MODEL_STANDARD
#   npx wrangler secret put OPENAI_MODEL_FAST

# ── Rate limiting ──
# 엣지에서 전역 집계되는 네이티브 레이트 리미터.
# 이 바인딩이 없으면 src/lib/rate-limit.ts가 인메모리 방식으로 강등되는데,
# Workers에서는 isolate마다 카운터가 따로 있어 사실상 무력합니다.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
